<!DOCTYPE html>

<html lang="vi" style=""><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nhận sân - Sân 01</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            surface: '#fbf8ff',
            'surface-container-lowest': '#ffffff',
            'surface-container-low': '#f4f2ff',
            'surface-dim': '#dad9e5',
            primary: '#1e40d6',
            'on-primary': '#ffffff',
            'primary-container': '#dee0ff',
            'on-primary-container': '#00105c',
            outline: '#767680',
            'outline-variant': '#c6c5d0',
            'on-surface': '#1b1b1f',
            'on-surface-variant': '#46464f',
            success: '#22c55e', /* Custom green for the button */
          },
          borderRadius: {
            'md': '0.5rem', // ROUND_EIGHT roughly
            'lg': '0.75rem',
            'xl': '1rem',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-utilities">
    /* Custom utility to handle the specific box shadow for the main card */
    .shadow-custom {
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-sans antialiased min-h-screen flex flex-col">
<!-- BEGIN: Header -->
<header class="bg-surface-container-lowest sticky top-0 z-10 px-4 py-3 flex items-center justify-between border-b border-surface-dim">
<!-- Close Button -->
<button aria-label="Close" class="p-2 -ml-2 text-on-surface-variant hover:bg-surface-container-low rounded-full transition-colors">
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
<!-- Title -->
<h1 class="text-primary font-bold text-lg leading-tight absolute left-1/2 transform -translate-x-1/2">
      Nhận sân - Sân 01
    </h1>
<!-- Empty div for flexbox alignment -->
<div class="w-10"></div>
</header>
<!-- END: Header -->
<!-- BEGIN: Main Content -->
<main class="flex-1 p-4 overflow-y-auto">
<!-- Form Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-custom p-4 border border-surface-dim/50">
<!-- Time Display -->
<div class="bg-surface-container-low rounded-lg p-4 flex items-center justify-between border border-primary-container/50 mb-6">
<div>
<p class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-1">Thời gian bắt đầu</p>
<p class="text-3xl font-bold text-on-surface">14:30</p>
</div>
<div class="bg-primary-container p-3 rounded-full text-primary">
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
</div>
<!-- Input Fields Form -->
<form class="space-y-4"><div class="mb-4"> <label class="block text-sm font-semibold text-on-surface-variant mb-1" for="pre_booked_customer">Chọn khách đặt trước (Tùy chọn)</label> <div class="relative"> <select class="block w-full px-3 py-3 border border-outline-variant rounded-md text-on-surface focus:ring-primary focus:border-primary sm:text-sm appearance-none bg-white" id="pre_booked_customer"> <option value="">Chọn khách hàng...</option> <option value="1">Nguyễn Văn A - 090xxxx123</option> <option value="2">Trần Thị B - 091xxxx456</option> </select> <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-on-surface-variant"> <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"> <path d="m19.5 8.25-7.5 7.5-7.5-7.5" stroke-linecap="round" stroke-linejoin="round"></path> </svg> </div> </div> </div>
<!-- Customer Name Field -->
<div>
<label class="block text-sm font-semibold text-on-surface-variant mb-1" for="customer_name">Tên khách hàng <span class="text-red-500">*</span></label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<svg class="w-5 h-5 text-outline" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-md text-on-surface focus:ring-primary focus:border-primary sm:text-sm placeholder-outline" id="customer_name" placeholder="Nhập tên khách hàng" required="" type="text"/>
</div>
</div>
<!-- Phone Number Field -->
<div>
<label class="block text-sm font-semibold text-on-surface-variant mb-1" for="phone_number">Số điện thoại</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<svg class="w-5 h-5 text-outline" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-2.896-1.596-5.48-4.08-7.074-6.97l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25Z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-md text-on-surface focus:ring-primary focus:border-primary sm:text-sm placeholder-outline" id="phone_number" placeholder="Nhập số điện thoại" type="tel"/>
</div>
</div>
<!-- Deposit Field -->
<div>
<label class="block text-sm font-semibold text-on-surface-variant mb-1" for="deposit">Tiền cọc (VNĐ)</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<svg class="w-5 h-5 text-outline" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M2.25 18.75a60.07 60.07 0 0 1 15.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 0 1 3 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 0 0-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 0 1-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 0 0 3 15h-.75M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-md text-on-surface focus:ring-primary focus:border-primary sm:text-sm placeholder-outline" id="deposit" type="number" value="0"/>
</div>
<p class="mt-1.5 text-xs text-right text-on-surface-variant font-medium">Khuyến nghị: 50,000 - 100,000</p>
</div>
</form>
</div>
</main>
<!-- END: Main Content -->
<!-- BEGIN: Footer Actions -->
<footer class="bg-surface-container-lowest border-t border-surface-dim p-4">
<div class="flex gap-3">
<!-- Cancel Button -->
<button class="flex-1 py-3 px-4 border border-outline-variant rounded-md shadow-sm text-sm font-semibold text-on-surface bg-surface-container-lowest hover:bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors" type="button">
        Hủy
      </button>
<!-- Start Button -->
<button class="flex-[2] py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-bold text-white focus:outline-none focus:ring-2 focus:ring-offset-2 transition-colors flex items-center justify-center gap-2 bg-primary hover:opacity-90 focus:ring-primary" type="button"><svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path clip-rule="evenodd" d="M4.5 5.653c0-1.427 1.529-2.33 2.779-1.643l11.54 6.347c1.295.712 1.295 2.573 0 3.286L7.28 19.99c-1.25.687-2.779-.217-2.779-1.643V5.653Z" fill-rule="evenodd"></path></svg>Bắt đầu chơi</button>
</div>
</footer>
<!-- END: Footer Actions -->
</body></html>
